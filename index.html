<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HowSus - News &amp; Media Authenticity Analyzer</title>
    <style>
      #root-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #0a0e1a;
        color: #94a3b8;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        gap: 16px;
      }
      #root-loader .loader-ring {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(59,130,246,0.2);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #root-loader p { font-size: 0.85rem; letter-spacing: 0.5px; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="root-loader" aria-hidden="true">
        <div class="loader-ring"></div>
        <p>Loading HowSus…</p>
      </div>
    </div>
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0e1a;color:#f1f5f9;font-family:sans-serif;padding:32px;text-align:center;">
        <div>
          <h1 style="color:#3b82f6;margin-bottom:16px">🔍 HowSus</h1>
          <p style="color:#94a3b8;max-width:400px">JavaScript is required to run HowSus. Please enable JavaScript in your browser settings and reload the page.</p>
        </div>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
