name: Refresh Corroboration Feed

on:
  schedule:
    - cron: '23 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh static feed data
        run: npm run refresh:data

      - name: Commit refreshed data
        run: |
          if git diff --quiet -- public/data/corroboration-feed.json; then
            echo "No feed changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/corroboration-feed.json
          git commit -m "chore(data): refresh corroboration feed"
          git push
